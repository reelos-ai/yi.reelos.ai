<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周易 · 宇宙观卦</title>
<style>
:root{
  --speed:1;
  --bg0:#03050b; --bg1:#0a0f1c;
  --ink:#e7ddc4; --ink-soft:rgba(231,221,196,.56);
  --gold:#d4b06a; --gold-dim:rgba(212,176,106,.4); --hair:rgba(212,176,106,.18);
  --accent:#c4543a;
  --panel:rgba(8,12,22,.86); --panel-edge:rgba(212,176,106,.26);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:"Songti SC","STSong","Noto Serif SC","Noto Serif CJK SC","SimSun",serif;
  background:radial-gradient(130% 100% at 50% 36%, var(--bg1) 0%, var(--bg0) 72%);
  color:var(--ink); overflow:hidden;
}
#stage{position:fixed; inset:0; width:100% !important; height:100% !important; display:block; touch-action:none;}
#vignette{position:fixed; inset:0; pointer-events:none;
  background:radial-gradient(92% 82% at 50% 46%, transparent 52%, rgba(1,2,6,.6) 100%);}

#masthead{position:fixed; left:clamp(14px,3vw,44px); top:clamp(16px,4vh,48px); display:flex; gap:14px; pointer-events:none; z-index:5;}
#masthead h1{writing-mode:vertical-rl; font-size:clamp(24px,3.2vw,38px); font-weight:600; letter-spacing:.44em; line-height:1;
  color:var(--ink); text-shadow:0 0 22px rgba(212,176,106,.25);}
#masthead .sub{writing-mode:vertical-rl; font-size:11.5px; letter-spacing:.52em; color:var(--ink-soft); padding-top:10px;}
#masthead .rule{width:1px; background:linear-gradient(var(--hair), transparent);}
#seal{position:fixed; right:clamp(14px,3vw,42px); top:clamp(16px,4vh,46px); width:44px; height:44px;
  border:2px solid var(--accent); color:#e06a4e; display:grid; place-items:center;
  font-size:24px; font-weight:700; border-radius:6px; transform:rotate(-3deg); z-index:5; user-select:none;
  box-shadow:0 0 18px rgba(196,84,58,.28), inset 0 0 0 1px rgba(196,84,58,.4);}
#tip{position:fixed; left:50%; transform:translateX(-50%); bottom:clamp(76px,12vh,108px);
  font-size:12px; letter-spacing:.34em; color:var(--ink-soft); pointer-events:none; z-index:4;
  opacity:.9; transition:opacity 1.2s;}

#controls{position:fixed; left:50%; bottom:clamp(12px,3vh,26px); transform:translateX(-50%);
  display:flex; align-items:center; gap:18px; padding:10px 18px; z-index:6;
  background:var(--panel); border:1px solid var(--panel-edge); border-radius:4px;
  box-shadow:0 10px 34px rgba(0,0,0,.5); backdrop-filter:blur(10px); flex-wrap:wrap; justify-content:center; max-width:94vw;}
#controls .grp{display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:.14em; color:var(--ink-soft);}
.seg{display:flex; border:1px solid var(--hair); border-radius:3px; overflow:hidden;}
.seg button{font:inherit; font-size:12px; letter-spacing:.1em; padding:5px 11px; background:transparent; color:var(--ink-soft);
  border:none; border-right:1px solid var(--hair); cursor:pointer; transition:.25s;}
.seg button:last-child{border-right:none;}
.seg button.on{background:var(--gold); color:#0a0d16;}
input[type=range]{width:96px; accent-color:var(--gold);}
#castBtn{font:inherit; font-size:15px; letter-spacing:.34em; text-indent:.34em; padding:8px 22px;
  color:#f3e9d2; background:linear-gradient(160deg,#a8462f,#7e3322); border:1px solid rgba(224,140,110,.4);
  border-radius:3px; cursor:pointer; box-shadow:0 0 22px rgba(196,84,58,.35); transition:transform .2s, box-shadow .3s;}
#castBtn:hover{transform:translateY(-1px); box-shadow:0 0 30px rgba(196,84,58,.55);}
#manualBtn{font:inherit; font-size:12px; letter-spacing:.18em; padding:7px 13px; background:transparent;
  color:var(--ink); border:1px solid var(--hair); border-radius:3px; cursor:pointer;}
#manualBtn:hover{border-color:var(--gold);}
#sndBtn{font:inherit; font-size:12px; letter-spacing:.18em; padding:7px 13px; background:transparent;
  color:var(--ink); border:1px solid var(--hair); border-radius:3px; cursor:pointer; transition:.25s;}
#sndBtn:hover{border-color:var(--gold);}
#sndBtn.off{color:var(--ink-soft); opacity:.55; text-decoration:line-through;}

#panel{position:fixed; top:0; right:0; height:100%; width:min(420px,94vw); z-index:8;
  background:var(--panel); border-left:1px solid var(--panel-edge);
  box-shadow:-20px 0 60px rgba(0,0,0,.55); backdrop-filter:blur(14px);
  transform:translateX(105%); transition:transform .5s cubic-bezier(.22,.8,.3,1);
  display:flex; flex-direction:column;}
#panel.open{transform:translateX(0);}
#panelHead{display:flex; align-items:center; justify-content:space-between; padding:18px 22px 8px;}
#panelHead .eyebrow{font-size:11px; letter-spacing:.55em; color:var(--gold-dim);}
#panelClose{font-size:19px; line-height:1; background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:4px 8px;}
#panelClose:hover{color:var(--gold);}
#panelBody{overflow-y:auto; padding:4px 24px 34px; flex:1; scrollbar-width:thin; scrollbar-color:var(--hair) transparent;}
.bigname{display:flex; align-items:baseline; gap:14px; margin:6px 0 2px; flex-wrap:wrap;}
.bigname .glyph{font-size:44px; line-height:1; color:var(--gold);}
.bigname .nm{font-size:28px; font-weight:600; letter-spacing:.14em;}
.bigname .no{font-size:12px; color:var(--ink-soft); letter-spacing:.2em;}
.py{font-family:Georgia,"Times New Roman",serif; font-style:italic; font-size:13px;
  color:var(--gold-dim); letter-spacing:.05em;}
.hexCard .py{margin-top:2px; font-size:12px;}
.meta{display:flex; flex-wrap:wrap; gap:6px 14px; margin:10px 0 4px; font-size:12.5px; color:var(--ink-soft); letter-spacing:.1em;}
.meta b{color:var(--ink); font-weight:600;}
.divider{height:1px; background:linear-gradient(90deg, var(--hair), transparent); margin:18px 0 4px;}
.sect{margin-top:18px;}
.sect h3{display:flex; align-items:center; gap:10px; font-size:12px; letter-spacing:.42em; color:var(--gold); margin-bottom:8px; font-weight:600;}
.sect h3 .ru{flex:1; height:1px; background:linear-gradient(90deg,var(--hair),transparent);}
.sect h3 .layer{color:#e0795a; letter-spacing:.1em; font-size:11px; border:1px solid rgba(196,84,58,.45); border-radius:2px; padding:1px 6px;}
.sect p{font-size:15px; line-height:2; letter-spacing:.05em;}
.sect p.sub{font-size:13.5px; color:var(--ink-soft); margin-top:6px;}

#yaoStack{display:flex; flex-direction:column-reverse; gap:9px; margin:14px 0 6px;}
.yrow{display:flex; align-items:center; gap:12px; min-height:20px;}
.yline{position:relative; width:160px; height:12px; flex:none;}
.yline .bar{position:absolute; top:0; height:100%; background:var(--ink); border-radius:1px;
  box-shadow:0 0 10px rgba(231,221,196,.25);
  transform:scaleX(0); transform-origin:center; transition:transform calc(.5s/var(--speed)) cubic-bezier(.2,.9,.3,1.2);}
.yrow.yang .b1{left:0; width:100%;} .yrow.yang .b2{display:none;}
.yrow.yin .b1{left:0; width:42%;} .yrow.yin .b2{right:0; width:42%;}
.yrow.shown .bar{transform:scaleX(1);}
.yrow.moving .bar{background:linear-gradient(90deg,#d97a52,#c4543a); box-shadow:0 0 14px rgba(196,84,58,.6);
  animation:pulse calc(1.8s/var(--speed)) ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.ytag{font-size:12.5px; color:var(--ink-soft); letter-spacing:.08em; white-space:nowrap;}
.ytag b{color:#e0795a; font-weight:600;}
.yrow.clickable{cursor:pointer;}
.yrow.clickable:hover .bar{background:var(--gold);}
#coinLine{font-size:13px; letter-spacing:.16em; color:var(--ink-soft); min-height:20px; margin:4px 0;}
#coinLine b{color:var(--ink);}
.resultPair{display:flex; align-items:center; gap:12px; margin-top:8px;}
.resultPair .arrow{color:#e0795a; font-size:18px;}
.hexCard{flex:1; border:1px solid var(--hair); border-radius:4px; padding:10px 12px; background:rgba(212,176,106,.04);}
.hexCard .t{font-size:11px; letter-spacing:.4em; color:var(--gold-dim);}
.hexCard .n{font-size:18px; font-weight:600; letter-spacing:.08em; margin-top:3px;}
.btnrow{display:flex; gap:10px; margin-top:18px;}
.btnrow button{font:inherit; font-size:13px; letter-spacing:.2em; padding:8px 14px; border-radius:3px; cursor:pointer;}
.btnrow .pri{background:linear-gradient(160deg,#a8462f,#7e3322); color:#f3e9d2; border:1px solid rgba(224,140,110,.4);}
.btnrow .sec{background:transparent; color:var(--ink); border:1px solid var(--hair);}
.btnrow .sec:hover{border-color:var(--gold);}

#genesisCaption{position:fixed; left:50%; top:15%; transform:translateX(-50%); text-align:center;
  z-index:5; pointer-events:none; opacity:0; transition:opacity .9s; width:90vw;}
#genesisCaption .main{font-size:clamp(22px,3vw,34px); letter-spacing:.5em; text-indent:.5em;
  color:#e7d6a8; font-weight:600; text-shadow:0 0 28px rgba(212,176,106,.45);}
#genesisCaption .sub{margin-top:10px; font-size:13px; letter-spacing:.42em; color:var(--ink-soft);}
#genesisBtn{font:inherit; font-size:12px; letter-spacing:.18em; padding:7px 13px; background:transparent;
  color:var(--gold); border:1px solid var(--gold-dim); border-radius:3px; cursor:pointer; transition:box-shadow .3s;}
#genesisBtn:hover{box-shadow:0 0 14px rgba(212,176,106,.35);}
#localNotice{display:none; position:fixed; left:50%; top:18px; transform:translateX(-50%); z-index:20;
  width:min(680px,92vw); padding:12px 16px; text-align:center; font-size:13px; line-height:1.7;
  color:#f1e4c6; background:rgba(126,51,34,.96); border:1px solid rgba(224,140,110,.55);
  border-radius:4px; box-shadow:0 16px 48px rgba(0,0,0,.55);}
#localNotice a{color:#fff1c9; font-weight:700;}
.aiSource{display:flex; align-items:center; gap:9px; margin-bottom:12px; color:var(--ink-soft); font-size:11px;}
.aiSource b{display:inline-flex; padding:4px 7px; border:1px solid rgba(196,84,58,.7); border-radius:3px;
  color:#ef8b6d; font-size:10px; letter-spacing:.16em; background:rgba(196,84,58,.08);}

/* —— 卦形小图（详解用） —— */
.triRow{display:flex; align-items:center; gap:18px; margin:12px 0 4px;}
.triShape{display:flex; flex-direction:column-reverse; gap:7px; width:88px; flex:none;}
.triShape .tl{display:flex; gap:10px; height:11px;}
.triShape .tl span{flex:1; background:var(--gold); border-radius:1.5px;
  box-shadow:0 0 9px rgba(212,176,106,.45);}
.triRow .jueBox .jue{font-size:21px; letter-spacing:.22em; color:var(--gold); font-weight:600;}
.triRow .jueBox .jhint{font-size:12px; letter-spacing:.12em; color:var(--ink-soft); margin-top:4px;}
.vern{font-size:13.5px; color:var(--ink-soft); margin-top:6px; line-height:1.9;
  padding-left:10px; border-left:2px solid rgba(212,176,106,.25);}
/* —— 叩问浮层 —— */
#askOverlay{position:fixed; inset:0; z-index:9; display:none; place-items:center;
  background:rgba(2,4,9,.62); backdrop-filter:blur(6px);}
#askOverlay.open{display:grid;}
.askCard{width:min(460px,92vw); padding:28px 30px 24px; background:var(--panel);
  border:1px solid var(--panel-edge); border-radius:6px; box-shadow:0 24px 80px rgba(0,0,0,.6);}
.askCard .askTitle{font-size:15px; letter-spacing:.6em; text-indent:.6em; color:var(--gold);
  text-align:center; margin-bottom:6px;}
.askCard .askSub{font-size:12px; letter-spacing:.2em; color:var(--ink-soft); text-align:center; margin-bottom:18px;}
#askInput{width:100%; font:inherit; font-size:16px; letter-spacing:.06em; color:var(--ink);
  background:rgba(212,176,106,.05); border:1px solid var(--hair); border-radius:4px;
  padding:11px 14px; outline:none; transition:border-color .3s;}
#askInput:focus{border-color:var(--gold-dim);}
#askInput::placeholder{color:rgba(231,221,196,.32);}
#domSeg{margin:14px 0 4px; flex-wrap:wrap;}
#domSeg button{flex:1;}
.askCard .btnrow{justify-content:center;}
/* —— 海报浮层 —— */
#posterOverlay{position:fixed; inset:0; z-index:10; display:none; place-items:center;
  background:rgba(2,4,9,.78); backdrop-filter:blur(8px);}
#posterOverlay.open{display:grid;}
#posterBox{display:flex; flex-direction:column; align-items:center; gap:14px; max-width:94vw;}
#posterImg{max-height:78vh; max-width:92vw; border:1px solid var(--panel-edge); border-radius:4px;
  box-shadow:0 30px 90px rgba(0,0,0,.7);}
@media (max-width:760px){
  #masthead h1{font-size:20px; letter-spacing:.3em;}
  #masthead .sub{display:none;}
  #seal{width:34px; height:34px; font-size:18px; border-width:1.5px;}
  #panel{width:100vw;}
  #panelBody{padding:4px 16px calc(30px + env(safe-area-inset-bottom));}
  #tip{display:none;}
  #controls{gap:7px 9px; padding:7px 10px;
    bottom:max(10px, env(safe-area-inset-bottom)); max-width:96vw; border-radius:6px;}
  #controls .grp{font-size:11px; gap:5px;}
  .seg button{padding:5px 8px; font-size:11px;}
  input[type=range]{width:64px;}
  #castBtn{font-size:13px; padding:7px 14px; letter-spacing:.22em; text-indent:.22em;}
  #genesisBtn,#manualBtn,#sndBtn{font-size:11px; padding:6px 8px; letter-spacing:.1em;}
  .askCard{padding:22px 18px 18px;}
  #domSeg button{padding:6px 4px;}
  .bigname .nm{font-size:24px;} .bigname .glyph{font-size:36px;}
  #genesisCaption{top:11%;}
  #posterBox .btnrow{flex-wrap:wrap; justify-content:center;}
}
@media (max-width:430px){
  #controls{left:50%; width:96vw;}
  #controls .grp:first-child{display:none;} /* 动效档位收起，默认标准 */
}
@media (prefers-reduced-motion: reduce){ .yrow.moving .bar{animation:none;} }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="vignette"></div>
<div id="localNotice">当前是文件预览，无法调用 Grok CLI。请改用 <a href="http://127.0.0.1:4173">http://127.0.0.1:4173</a> 进行本地 AI 测试。</div>

<div id="masthead">
  <h1>周易观卦</h1>
  <div class="rule"></div>
  <div class="sub">仰以观于天文 · 俯以察于地理</div>
</div>
<div id="seal">易</div>
<div id="tip">「开天演卦」观宇宙生成 · 轻触太极叩问起卦</div>
<div id="genesisCaption"><div class="main"></div><div class="sub"></div></div>

<footer id="controls">
  <div class="grp">动效
    <div class="seg" id="fxSeg">
      <button data-d="0.55">静谧</button>
      <button data-d="1" class="on">标准</button>
      <button data-d="1.7">盛大</button>
    </div>
  </div>
  <div class="grp">节奏 <input type="range" id="speed" min="0.25" max="3" step="0.05" value="1"></div>
  <button id="sndBtn" title="音效开关">音效 · 开</button>
  <button id="genesisBtn">开天演卦</button>
  <button id="manualBtn">手动排卦</button>
  <button id="castBtn">起 卦</button>
</footer>

<aside id="panel">
  <div id="panelHead">
    <span class="eyebrow" id="panelEyebrow">观象</span>
    <button id="panelClose" aria-label="关闭">✕</button>
  </div>
  <div id="panelBody"></div>
</aside>

<div id="askOverlay">
  <div class="askCard">
    <div class="askTitle">叩 问</div>
    <div class="askSub">心有所惑，叩之以诚 · 亦可留空泛观</div>
    <input id="askInput" maxlength="40" placeholder="所问何事，如：是否接受新的工作机会">
    <div class="seg" id="domSeg">
      <button data-d="通用" class="on">通用</button>
      <button data-d="事业">事业</button>
      <button data-d="情感">情感</button>
      <button data-d="财富">财富</button>
      <button data-d="健康">健康</button>
      <button data-d="抉择">抉择</button>
    </div>
    <div class="btnrow">
      <button class="pri" id="askGo">凝神 · 起卦</button>
      <button class="sec" id="askCancel">返回</button>
    </div>
  </div>
</div>

<div id="posterOverlay">
  <div id="posterBox">
    <img id="posterImg" alt="观卦海报">
    <div class="btnrow">
      <button class="pri" id="posterSave">保存海报</button>
      <button class="sec" id="posterShare">分享</button>
      <button class="sec" id="posterClose">关闭</button>
    </div>
  </div>
</div>

<script>

 10:["素履往，无咎。","履道坦坦，幽人贞吉。","眇能视，跛能履。履虎尾，咥人凶。武人为于大君。","履虎尾，愬愬，终吉。","夬履，贞厉。","视履考祥，其旋元吉。"],
 11:["拔茅茹，以其汇，征吉。","包荒，用冯河，不遐遗，朋亡。得尚于中行。","无平不陂，无往不复。艰贞无咎。勿恤其孚，于食有福。","翩翩，不富以其邻。不戒以孚。","帝乙归妹，以祉元吉。","城复于隍，勿用师。自邑告命，贞吝。"],

 16:["鸣豫，凶。","介于石，不终日，贞吉。","盱豫悔，迟有悔。","由豫，大有得。勿疑，朋盍簪。","贞疾，恒不死。","冥豫成，有渝无咎。"],

 18:["干父之蛊，有子，考无咎，厉终吉。","干母之蛊，不可贞。","干父之蛊，小有悔，无大咎。","裕父之蛊，往见吝。","干父之蛊，用誉。","不事王侯，高尚其事。"],
 19:["咸临，贞吉。","咸临，吉，无不利。","甘临，无攸利。既忧之，无咎。","至临，无咎。","知临，大君之宜，吉。","敦临，吉，无咎。"],
 20:["童观，小人无咎，君子吝。","闚观，利女贞。","观我生进退。","观国之光，利用宾于王。","观我生，君子无咎。","观其生，君子无咎。"],

 23:["剥床以足，蔑贞凶。","剥床以辨，蔑贞凶。","剥之，无咎。","剥床以肤，凶。","贯鱼，以宫人宠，无不利。","硕果不食，君子得舆，小人剥庐。"],
 24:["不远复，无祗悔，元吉。","休复，吉。","频复，厉无咎。","中行独复。","敦复，无悔。","迷复，凶，有灾眚。用行师，终有大败。以其国君凶，至于十年不克征。"],
 25:["无妄往，吉。","不耕获，不菑畬，则利有攸往。","无妄之灾，或系之牛。行人之得，邑人之灾。","可贞，无咎。","无妄之疾，勿药有喜。","无妄行，有眚，无攸利。"],
 26:["有厉利巳。","舆说輹。","良马逐，利艰贞。曰：闲舆卫，利有攸往。","童牛之牿，元吉。","豮豕之牙，吉。","何天之衢，亨。"],
 27:["舍尔灵龟，观我朵颐，凶。","颠颐，拂经于丘。颐，征凶。","拂颐，贞凶。十年勿用，无攸利。","颠颐，吉。虎视耽耽，其欲逐逐，无咎。","拂经，居贞，吉。不可涉大川。","由颐，厉吉，利涉大川。"],
 28:["藉用白茅，无咎。","枯杨生稊，老夫得其女妻，无不利。","栋桡，凶。","栋隆，吉。有它吝。","枯杨生华，老妇得其士夫，无咎无誉。","过涉灭顶，凶，无咎。"],
 29:["「习坎」，入于坎窞，凶。","坎有险，求小得。","来之坎坎，险且枕，「入于坎窞」，勿用。","樽酒簋贰，用缶，纳约自牖，终无咎。","坎不盈，祗既平，无咎。","系用徽纆，置于丛棘，三岁不得，凶。"],
 30:["履错然，敬之，无咎。","黄离，元吉。","日昃之离，不鼓缶而歌，则大耋之嗟，凶。","突如其来如，焚如，死如，弃如。","出涕沱若，戚嗟若，吉。","王用出征，有嘉折首，获匪其丑，无咎。"],
 31:["咸其拇。","咸其腓，凶。居吉。","咸其股，执其随，往吝。","贞吉，悔亡。憧憧往来，朋从尔思。","咸其脢，无悔。","咸其辅、颊、舌。"],
 32:["浚恒，贞凶，无攸利。","悔亡。","不恒其德，或承之羞，贞吝。","田，无禽。","恒其德，贞。妇人吉，夫子凶。","振恒，凶。"],
 33:["遯尾，厉，勿用有攸往。","执之用黄牛之革，莫之胜说。","系遯，有疾厉，畜臣妾，吉。","好遯，君子吉，小人否。","嘉遯，贞吉。","肥遯，无不利。"],
 34:["壮于趾，征凶有孚。","贞吉。","小人用壮，君子用罔，贞厉。羝羊触藩，羸其角。","贞吉，悔亡。藩决不羸。壮于大舆之輹。","丧羊于易，无悔。","羝羊触藩，不能退，不能遂。无攸利，艰则吉。"],
 35:["晋如、摧如，贞吉。罔孚，裕，无咎。","晋如，愁如，贞吉。受兹介福，于其王母。","众允，悔亡。","晋如鼫鼠，贞厉。","悔亡。失得勿恤，往，吉，无不利。","晋其角，维用伐邑。厉吉无咎，贞吝。"],
 36:["明夷于飞，垂其翼。君子于行，三日不食。有攸往，主人有言。","明夷，夷于左股，用拯马壮，吉。「","明夷于南狩，得其大首，不可疾贞。","入于左腹，获明夷之心，于出门庭。","箕子之明夷，利贞。","不明晦，初登于天，后入于地。"],
 37:["闲有家，悔亡。","无攸遂，在中馈，贞吉。","家人嗃嗃，悔厉，吉。妇子嘻嘻，终吝。","富家，大吉。","王假有家，勿恤，吉。","有孚，威如，终吉。"],
 38:["悔亡。丧马，勿逐，自复。见恶人，无咎。","遇主于巷，无咎。","见舆曳，其牛掣。其人天且劓，无初有终。","睽孤，遇元夫。交孚，厉，无咎。","悔亡。厥宗噬肤，往，何咎？","睽孤。见豕负涂，载鬼一车，先张之弧，后说之弧。匪寇婚媾，往，遇雨则吉。"],
 39:["往蹇，来誉。","王臣蹇蹇，匪躬之故。","往蹇，来反。","往蹇，来连。","大蹇，朋来。","往蹇来硕，吉。利见大人。"],
 40:["无咎。","田获三狐，得黄矢，贞吉。","负且乘，致寇至，贞吝。","解而拇，朋至斯孚。","君子维有解，吉。有孚于小人。","公用射隼于高墉之上，获之，无不利。"],
 41:["巳事遄往，无咎，酌损之。","利贞，征凶。弗损，益之。","三人行则损一人，一人行则得其友。","损其疾，使遄有喜，无咎。","或益之，十朋之龟，弗克违，元吉。","弗损，益之，无咎，贞吉，利有攸往。得臣无家。"],
 42:["利用为大作，元吉，无咎。","或益之十朋之龟，弗克违，永贞吉。王用享于帝，吉。","益之，用凶事，无咎。有孚中行，告公用圭。","中行，告公从，利用为依迁国。","有孚惠心，勿问元吉。有孚，惠我德。","莫益之，或击之，立心勿恒，凶。"],
 43:["壮于前趾，往不胜，为咎。","惕号，莫夜有戎，勿恤。","壮于頄，有凶。君子夬夬，独行，遇雨若濡。有愠，无咎。","臀无肤，其行次且。牵羊悔亡，闻言不信。","苋陆夬夬，中行无咎。","无号，终有凶。"],
 44:["系于金柅，贞吉。有攸往，见凶。羸豕孚蹢躅。","包有鱼，无咎，不利宾。","臀无肤，其行次且，厉，无大咎。","包无鱼，起凶。","以杞包瓜，含章，有陨自天。","姤其角，吝，无咎。"],

 46:["允升，大吉。","孚乃利用禴，无咎。","升虚邑。","王用亨于岐山，吉，无咎。","贞吉，升阶。","冥升，利于不息之贞。"],
 47:["臀困于株木，入于幽谷，三岁不觌。","困于酒食，朱绂方来，利用享祀。征凶，无咎。","困于石，据于蒺藜，入于其宫，不见其妻，凶。","来徐徐，困于金车。吝，有终。","劓刖，困于赤绂，乃徐有说，利用祭祀。","困于葛藟，于臲卼，曰动悔、有悔，征吉。"],
 48:["井泥不食，旧井无禽。","井谷射鲋，瓮敝漏。","井渫不食，为我心恻，可用汲。王明，并受其福。","井甃，无咎。","井洌寒泉，食。","井收。勿幕有孚，元吉。"],
 49:["巩用黄牛之革。","巳日乃革之，征吉，无咎。","征凶，贞厉。革言三就，有孚。","悔亡，有孚改命，吉。","大人虎变，未占有孚。","君子豹变，小人革面。"],
 50:["鼎颠趾，利出否，得妾以其子，无咎。","鼎有实，我仇有疾，不我能即，吉。","鼎耳革，其行塞，雉膏不食。方雨亏悔，终吉。","鼎折足，覆公餗，其形渥，凶。","鼎黄耳金铉，利贞。","鼎玉铉，大吉，无不利。"],
 51:["「震来虩虩」，后「笑言哑哑」，吉。","震来厉，亿丧贝。跻于九陵，勿逐，七日得。","震苏苏，震行无眚。","震遂泥。","震往来厉，亿无丧，有事。","震索索，视矍矍，征凶。震不于其躬，于其邻，无咎。婚媾有言。"],
 52:["艮其趾，无咎，利永贞。","艮其腓，不拯其随，其心不快。","艮其限，列其夤，厉薰心。","艮其身，无咎。","艮其辅，言有序，悔亡。","敦艮，吉。"],
 53:["鸿渐于干，小子厉，有言，无咎。","鸿渐于磐，饮食衎衎，吉。","鸿渐于陆。夫征不复，妇孕不育，凶。利御寇。","鸿渐于木。或得其桷，无咎。","鸿渐于陵。妇三岁不孕，终莫之胜，吉。","鸿渐于陆。其羽可用为仪，吉。"],
 54:["归妹以娣，跛能履，征吉。","眇能视，利幽人之贞。","归妹以须，反归以娣。","归妹愆期，迟归有时。","帝乙归妹，其君之袂，不如其娣之袂良。月几望，吉。","女承筐，无实，士刲羊，无血，无攸利。"],
 55:["遇其配主，虽旬无咎，往有尚。","丰其蔀，日中见斗。往得疑疾，有孚发若，吉。","丰其沛，日中见沬。折其右肱，无咎。","丰其蔀，日中见斗。遇其夷主，吉。","来章有庆誉，吉。","丰其屋，蔀其家，闚其户，阒其无人。三岁不觌，凶。"],
 56:["旅琐琐，斯其所取灾。","旅即次，怀其资，得童仆贞。","旅焚其次，丧其童仆，贞厉。","旅于处，得其资斧，我心不快。","射雉一矢，亡。终以誉命。","鸟焚其巢，旅人先笑后号咷。丧牛于易，凶。"],
 57:["进退，利武人之贞。","巽在床下，用史巫纷若，吉，无咎。","频巽，吝。","悔亡，田获三品。","贞吉，悔亡，无不利。无初有终。先庚三日，后庚三日，吉。","巽在床下，丧其资斧，贞凶。"],
 58:["和兑，吉。","孚兑，吉，悔亡。","来兑，凶。","商兑未宁，介疾有喜。","孚于剥，有厉。","引兑。"],
 59:["用拯马壮，吉。","涣奔其机，悔亡。","涣其躬，无悔。","涣其群，元吉。涣有丘，匪夷所思。","涣汗其大号。涣，王居无咎。","涣其血，去逖出，无咎。"],
 60:["不出户庭，无咎。","不出门庭，凶。","不节若，则嗟若，无咎。","安节，亨。","甘节，吉。往有尚。","苦节，贞凶，悔亡。"],
 61:["虞吉，有它不燕。","鸣鹤在阴，其子和之。我有好爵，吾与尔靡之。","得敌，或鼓或罢，或泣或歌。","月几望，马匹亡，无咎。","有孚挛如，无咎。","翰音登于天，贞凶。"],
 62:["飞鸟以凶。","过其祖，遇其妣，不及其君。遇其臣，无咎。","弗过防之，从或戕之，凶。","无咎，弗过遇之，往厉必戒，勿用永贞。","密云不雨，自我西郊，公弋取彼在穴。","弗遇过之，飞鸟离之，凶，是谓灾眚。"],

function softTex(rgb){
  const c = document.createElement("canvas"); c.width=c.height=64;
  const g = c.getContext("2d");
  const gr = g.createRadialGradient(32,32,0,32,32,32);
  gr.addColorStop(0,`rgba(${rgb},1)`); gr.addColorStop(.4,`rgba(${rgb},.45)`); gr.addColorStop(1,`rgba(${rgb},0)`);
  g.fillStyle=gr; g.fillRect(0,0,64,64);
  const t = new THREE.CanvasTexture(c); return t;
}
const TEX = {
  gold: softTex("222,190,128"), pale: softTex("214,222,232"),
  teal: softTex("130,184,190"), fire: softTex("228,120,80"),
};
function nebulaTex(rgb){
  const c = document.createElement("canvas"); c.width=c.height=256;
  const g = c.getContext("2d");
  for(let i=0;i<5;i++){
    const x=128+(Math.random()-.5)*120, y=128+(Math.random()-.5)*120, r=60+Math.random()*80;
    const gr = g.createRadialGradient(x,y,0,x,y,r);
    gr.addColorStop(0,`rgba(${rgb},${.22+Math.random()*.15})`); gr.addColorStop(1,`rgba(${rgb},0)`);
    g.fillStyle=gr; g.fillRect(0,0,256,256);
  }
  return new THREE.CanvasTexture(c);
}
function taijiTex(){
  const S=1024, c=document.createElement("canvas"); c.width=c.height=S;
  const g=c.getContext("2d"); g.translate(S/2,S/2);
  const r=S*.47;
  g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.fillStyle="#070a12"; g.fill();
  g.beginPath();
  g.arc(0,0,r, Math.PI/2, -Math.PI/2, false);
  g.arc(0,-r/2, r/2, -Math.PI/2, Math.PI/2, false);
  g.arc(0, r/2, r/2, -Math.PI/2, Math.PI/2, true);
  g.closePath(); g.fillStyle="#ece3cd"; g.fill();
  g.beginPath(); g.arc(0,-r/2,r*.13,0,Math.PI*2); g.fillStyle="#070a12"; g.fill();
  g.beginPath(); g.arc(0, r/2,r*.13,0,Math.PI*2); g.fillStyle="#ece3cd"; g.fill();
  g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.lineWidth=S*.008; g.strokeStyle="rgba(212,176,106,.75)"; g.stroke();
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t;
}

function makeGalaxy(){
  const N=4200, pos=new Float32Array(N*3), col=new Float32Array(N*3);
  const cIn=new THREE.Color(0xe8cf9a), cOut=new THREE.Color(0x7e9cc8);
  for(let i=0;i<N;i++){
    const arm = i%3, t = Math.pow(Math.random(), .65);
    const r = 60+t*740;
    const a = arm*(Math.PI*2/3) + t*4.6 + (Math.random()-.5)*.5/(t+.15);
    const x = Math.cos(a)*r + (Math.random()-.5)*26;
    const y = (Math.random()-.5)*(34*(1-t)+8);
    const z = Math.sin(a)*r + (Math.random()-.5)*26;
    pos.set([x,y,z], i*3);
    const cc = cIn.clone().lerp(cOut, t*.9);
    const dim = .35+.65*Math.random();
    col.set([cc.r*dim, cc.g*dim, cc.b*dim], i*3);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
  geo.setAttribute("color", new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({size:2.6, map:TEX.pale, vertexColors:true,
    transparent:true, opacity:.8, depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true});
  const pts = new THREE.Points(geo, mat);
  pts.position.set(-420, 260, -1100);
  pts.rotation.set(-1.05, .2, .5);
  return pts;
}

    sparks.push({
      p:origin.clone().add(jitter.clone().multiplyScalar(2)),
      v:new THREE.Vector3((Math.random()-.5)*1.4,(Math.random()-.5)*1.4,(Math.random()-.5)*1.4),
      t:0, max:520+Math.random()*340,
      c:new THREE.Color(fire?0xe47850:0xdebe80).multiplyScalar(.95),
      seek:.09, target:target.clone().add(jitter), drag:.93,
    });
  }
}

/* ═══════════════════════ 五之半 · 音效引擎（Web Audio 合成，无外部资源）═══════════════════════ */
const SFX = (()=>{
  let ctx=null, master=null, bus=null, on=true, drone=null, nb=null, lastTick=0;
  function ac(){
    if(!on) return null;
    if(!ctx){
      const AC = window.AudioContext||window.webkitAudioContext;
      if(!AC){ on=false; return null; }
      ctx = new AC();
      master = ctx.createGain(); master.gain.value=.5; master.connect(ctx.destination);
      // 总线 → 柔化低通 → 干声 + 殿堂混响（生成式 IR，无外部资源）
      bus = ctx.createGain();
      const soft = ctx.createBiquadFilter(); soft.type="lowpass"; soft.frequency.value=4800; soft.Q.value=.3;
      bus.connect(soft);
      const dry = ctx.createGain(); dry.gain.value=.7;
      soft.connect(dry); dry.connect(master);
      const len = Math.floor(ctx.sampleRate*2.8);
      const ir = ctx.createBuffer(2, len, ctx.sampleRate);
      for(let ch=0;ch<2;ch++){
        const d=ir.getChannelData(ch);
        for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3.2);
      }
      const conv = ctx.createConvolver(); conv.buffer=ir;
      const wet = ctx.createGain(); wet.gain.value=.55;
      soft.connect(conv); conv.connect(wet); wet.connect(master);
    }
    if(ctx.state==="suspended") ctx.resume();
    return ctx;
  }
  function tone(freq,{type="sine",delay=0,dur=.8,vol=.2,slideTo=0,att=.02}={}){
    if(!ac()) return;
    const t0=ctx.currentTime+delay;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(24,slideTo), t0+dur);
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vol,t0+att);
    g.gain.exponentialRampToValueAtTime(.0002,t0+dur);
    o.connect(g).connect(bus);
    o.start(t0); o.stop(t0+dur+.1);
  }
  // 磬 / 编钟：基音为主、泛音极轻，微失谐生韵
  function bell(freq,{delay=0,vol=.2,dur=2.6}={}){
    tone(freq,        {delay,        dur,          vol,         att:.006});
    tone(freq*2.003,  {delay:delay+.008, dur:dur*.6, vol:vol*.22, att:.006});
    tone(freq*2.96,   {delay:delay+.014, dur:dur*.35, vol:vol*.07, att:.006});
  }
  function noise({delay=0,dur=.8,vol=.1,f0=900,f1=140,q=.8}={}){
    if(!ac()) return;
    if(!nb){
      nb = ctx.createBuffer(1, ctx.sampleRate*1.2, ctx.sampleRate);
      const d=nb.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    }
    const t0=ctx.currentTime+delay;
    const src=ctx.createBufferSource(); src.buffer=nb; src.loop=true;
    const f=ctx.createBiquadFilter(); f.type="bandpass"; f.Q.value=q;
    f.frequency.setValueAtTime(f0,t0);
    f.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t0+dur);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(vol,t0+dur*.25);
    g.gain.exponentialRampToValueAtTime(.0002,t0+dur);
    src.connect(f); f.connect(g); g.connect(bus);
    src.start(t0); src.stop(t0+dur+.1);
  }
  // 玉磬轻击：双正弦短鸣，过混响后温润
  function clink(delay,vol){
    tone(1567.98,{delay,dur:.22,vol:vol,att:.004});
    tone(2093,   {delay:delay+.006,dur:.14,vol:vol*.4,att:.004});
  }
  const PENTA=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.26]; // 宫商角徵羽延展
  return {
    get on(){ return on; },
    toggle(){ on=!on; if(!on) this.droneStop(); return on; },
    resume(){ if(on && ctx && ctx.state==="suspended") ctx.resume(); },
    // —— 交互 ——
    tick(){ if(!on) return; const now=performance.now(); if(now-lastTick<90) return; lastTick=now;
      tone(1046.5,{dur:.12,vol:.03,att:.004}); },
    pluck(){ bell(523.25,{vol:.09,dur:1.6}); },
    // —— 起卦仪式 ——
    castStart(){ noise({dur:2,vol:.07,f0:240,f1:1100}); bell(110,{vol:.2,dur:3.5}); bell(220,{delay:.4,vol:.08,dur:2.5}); },
    castLine(i,fire){
      clink(0,.05); clink(.1,.035);
      bell(PENTA[i],{delay:.28,vol:.13,dur:2});
      if(fire) bell(PENTA[i]*2,{delay:.42,vol:.05,dur:1.4});
    },
    reveal(changed){
      bell(196,{vol:.2,dur:4}); bell(293.66,{delay:.25,vol:.13,dur:3.2}); bell(392,{delay:.5,vol:.1,dur:3});
      if(changed) bell(587.33,{delay:.85,vol:.07,dur:2.4});
      noise({dur:2.2,vol:.04,f0:1000,f1:300});
    },
    dissolve(){ noise({dur:1.4,vol:.06,f0:800,f1:90}); bell(392,{vol:.06,dur:1.8}); },
    // —— 开天演卦 ——
    rumble(){ noise({dur:1.8,vol:.09,f0:140,f1:48,q:.6}); tone(49,{dur:1.8,vol:.1,slideTo:38,att:.3}); },
    gong(){ bell(87.3,{vol:.22,dur:5}); bell(130.8,{delay:.06,vol:.1,dur:4}); noise({dur:2.6,vol:.04,f0:420,f1:110}); },
    strike(){ bell(523.25,{vol:.18,dur:3}); bell(784,{delay:.08,vol:.08,dur:2.2}); },
    duo(){ bell(261.63,{vol:.15,dur:2.6}); bell(392,{delay:.55,vol:.15,dur:2.6}); },
    arp4(){ [0,2,4,5].forEach((n,i)=>bell(PENTA[n],{delay:i*.34,vol:.12,dur:2})); },
    bellNote(k){ bell(PENTA[k%PENTA.length],{vol:.13,dur:2.2}); },
    shimmer(){ [1318.5,1568,1760,2093].forEach((f,i)=>tone(f,{delay:i*.16,dur:.9,vol:.025,att:.01})); },
    finale(){ bell(110,{vol:.22,dur:5.5}); bell(220,{delay:.25,vol:.13,dur:4.5});
      bell(329.63,{delay:.55,vol:.09,dur:4}); bell(440,{delay:.9,vol:.06,dur:3.5}); this.shimmer(); },
    droneStart(){ if(!ac()||drone) return;
      const o1=ctx.createOscillator(), o2=ctx.createOscillator(), o3=ctx.createOscillator(),
            lfo=ctx.createOscillator(), lg=ctx.createGain(), g=ctx.createGain();
      o1.type="sine"; o1.frequency.value=55;
      o2.type="sine"; o2.frequency.value=55.35;   // 微差拍
      o3.type="sine"; o3.frequency.value=110.2;
      lfo.type="sine"; lfo.frequency.value=.13; lg.gain.value=.018;
      const t0=ctx.currentTime;
      g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(.055,t0+3);
      lfo.connect(lg); lg.connect(g.gain);
      o1.connect(g); o2.connect(g); o3.connect(g); g.connect(bus);
      o1.start(); o2.start(); o3.start(); lfo.start();
      drone={osc:[o1,o2,o3,lfo],g};
    },
    droneStop(){ if(!drone||!ctx) return;
      const {osc,g}=drone; drone=null;
      const t0=ctx.currentTime;
      g.gain.cancelScheduledValues(t0); g.gain.setValueAtTime(Math.max(g.gain.value,.0001),t0);
      g.gain.linearRampToValueAtTime(.0001,t0+1.8);
      osc.forEach(o=>o.stop(t0+2));
    },
  };
})();

addEventListener("pointerdown", ()=>SFX.resume(), true);

/* ═══════════════════════ 六 · 起卦仪式 ═══════════════════════ */
const RIT = {active:false, phase:"idle", t:0, vals:[], bars:[], nameSp:null, result:null, dissolve:0, onDissolved:null};
const T_GATHER=1500, T_LINE=980, T_REVEAL=650;
const BAR_W=120, BAR_TH=13, BAR_GAP=10.5;
const camUp = new THREE.Vector3(), camRight = new THREE.Vector3();
function barWorldPos(i, out){ // i:0 初爻（最下）
  const total = 6*BAR_TH + 5*BAR_GAP;
  const off = -total/2 + BAR_TH/2 + i*(BAR_TH+BAR_GAP);
  return out.set(0,6,0).addScaledVector(camUp, off);
}
function makeBarSprites(v){
  const yang = v%2===1, fire = (v===6||v===9);
  const mat = new THREE.SpriteMaterial({map: fire?TEX_BAR_FIRE:TEX_BAR, transparent:true,
    opacity:.95, depthWrite:false, depthTest:false, blending:THREE.AdditiveBlending});
  const g = new THREE.Group(); g.renderOrder = 10;
  if(yang){
    const s = new THREE.Sprite(mat); s.renderOrder=10; s.userData.w = BAR_W; g.add(s);
  } else {
    [-1,1].forEach(side=>{
      const s = new THREE.Sprite(mat.clone()); s.renderOrder=10;
      s.userData.w = BAR_W*.42; s.userData.side = side; g.add(s);
    });
  }
  g.userData = {v, fire, grow:0};
  scene.add(g);
  return g;
}
function layoutBar(g, i){
  const c = new THREE.Vector3(); barWorldPos(i, c);
  const k = g.userData.grow, kk = 1-Math.pow(1-Math.min(1,k),3);
  g.children.forEach(s=>{
    const w = s.userData.w*kk*FIT.ui;
    s.scale.set(Math.max(w,.001), BAR_TH*2.1, 1);
    const off = s.userData.side? s.userData.side*(BAR_W/2 - s.userData.w/2)*FIT.ui:0;
    s.position.copy(c).addScaledVector(camRight, off*kk);
    if(g.userData.fire && RIT.phase!=="dissolve"){
      s.material.opacity = .7+.3*Math.sin(performance.now()*.004*state.speed);
    }
  });
}
function startCast(){
  if(GEN.active) return;
  if(RIT.active && RIT.phase!=="done") return;
  clearTimers();
  RIT.active=true; RIT.phase="gather"; RIT.t=0;
  RIT.vals=[]; RIT.result=null; RIT.dissolve=0;
  RIT.bars.forEach(b=>scene.remove(b)); RIT.bars=[];
  if(RIT.nameSp){ scene.remove(RIT.nameSp); RIT.nameSp=null; }
  openCastPanel();
  SFX.castStart();
  burst(new THREE.Vector3(0,6,0), Math.round(30*state.density), {spMin:.2,spVar:.5,life:1200,color:new THREE.Color(0x82b8be),al:.6});
}
function endCast(then){
  if(!RIT.active){ if(then) then(); return; }
  RIT.phase="dissolve"; RIT.dissolve=0; RIT.onDissolved=then||null;
  SFX.dissolve();
  RIT.bars.forEach((b,i)=>{
    const c=new THREE.Vector3(); barWorldPos(i,c);
    burst(c, Math.round(22*state.density), {spMin:.5,spVar:1.6,life:850,
      color:new THREE.Color(b.userData.fire?0xe47850:0xdebe80), al:.85});
  });
}
function ritualStep(dt){
  if(!RIT.active) return;
  RIT.t += dt*state.speed;
  const ease = x=>1-Math.pow(1-Math.min(1,Math.max(0,x)),3);
  if(RIT.phase==="gather"){
    const k = Math.min(1, RIT.t/T_GATHER);
    state.coreScale = 1-(1-.3)*ease(k);
    state.coreGlow = ease(k); state.ringDim = .72*ease(k);
    if(k>=1){ RIT.phase="lines"; RIT.t=0; }
  }
  else if(RIT.phase==="lines"){
    const i = RIT.bars.length;
    if(i<6 && RIT.t >= (i===0?180:i*T_LINE)){
      const coins=[0,0,0].map(()=>Math.random()<.5?2:3);
      const v=coins[0]+coins[1]+coins[2];
      RIT.vals.push(v);
      const bar = makeBarSprites(v); RIT.bars.push(bar);
      const c=new THREE.Vector3(); barWorldPos(i,c);
      streamTo(new THREE.Vector3(0,6,0), c, Math.round(40*state.density), v===6||v===9);
      castPanelLine(i, v, coins);
      SFX.castLine(i, v===6||v===9);
    }
    RIT.bars.forEach(b=>{ b.userData.grow = Math.min(1, b.userData.grow + dt*state.speed/520); });
    if(RIT.bars.length===6 && RIT.t >= 6*T_LINE+320){
      RIT.phase="reveal"; RIT.t=0;
      RIT.result = linesToResult(RIT.vals);
      burst(new THREE.Vector3(0,6,0), Math.round(50*state.density), {spMin:.7,spVar:2.2,life:1100,al:.9});
      const sub = RIT.result.changed? `之 ${RIT.result.zhi.name}` : "";
      const m = new THREE.SpriteMaterial({map:nameTex(RIT.result.ben.name, sub), transparent:true,
        opacity:0, depthWrite:false, depthTest:false});
      RIT.nameSp = new THREE.Sprite(m); RIT.nameSp.renderOrder=11;
      RIT.nameSp.scale.set(124*FIT.ui, 46.5*FIT.ui, 1);
      scene.add(RIT.nameSp);
      castPanelResult(RIT.result);
      SFX.reveal(RIT.result.changed);
    }
  }
  else if(RIT.phase==="reveal"){
    if(RIT.nameSp) RIT.nameSp.material.opacity = Math.min(1, RIT.t/T_REVEAL);
    if(RIT.t>=T_REVEAL) RIT.phase="done";
  }
  else if(RIT.phase==="dissolve"){
    RIT.dissolve = Math.min(1, RIT.dissolve + dt*state.speed/700);
    const e = ease(RIT.dissolve);
    state.coreScale = .3+(1-.3)*e;
    state.coreGlow = 1-e; state.ringDim = .72*(1-e);
    RIT.bars.forEach(b=>b.children.forEach(s=>s.material.opacity = .95*(1-e)));
    if(RIT.nameSp) RIT.nameSp.material.opacity = 1-e;
    if(RIT.dissolve>=1){
      RIT.bars.forEach(b=>scene.remove(b)); RIT.bars=[];
      if(RIT.nameSp){ scene.remove(RIT.nameSp); RIT.nameSp=null; }
      RIT.active=false; RIT.phase="idle";
      const fn=RIT.onDissolved; RIT.onDissolved=null; if(fn) fn();
    }
  }
  // 名牌跟随相机上方
  if(RIT.nameSp){
    const total = 6*BAR_TH+5*BAR_GAP;
    RIT.nameSp.position.set(0,6,0).addScaledVector(camUp, total/2+34);
  }
}


/* ═══════════════════════ 六之半 · 开天演卦（创世时间线）═══════════════════════ */
const GEN = {active:false, t:0, idx:0, tl:[], stacks:[], pulses:[],
  camTarget:new THREE.Vector3(0,86,540), taijiIn:null, endAt:0,
  spokes:null, octa:null, lineOp:0, lineOpT:0};
const GEN_W=58, GEN_TH=6.5, GEN_GAP=8.5;
const capEl = document.getElementById("genesisCaption");
function cap(main, sub){
  capEl.querySelector(".main").textContent = main;
  capEl.querySelector(".sub").textContent = sub||"";
  capEl.style.opacity = "1";
}
function capSub(sub){ capEl.querySelector(".sub").textContent = sub; }
function hideCap(){ capEl.style.opacity = "0"; }
function smallTex(text){
  const c=document.createElement("canvas"); c.width=480; c.height=192;
  const g=c.getContext("2d"); g.textAlign="center"; g.fillStyle="#ffffff";
  g.font='96px "Songti SC","STSong","Noto Serif SC",serif';

}
const easeG = x=>1-Math.pow(1-Math.min(1,Math.max(0,x)),3);
class GStack{
  constructor(bits, x, y){
    this.cx=x; this.cy=y; this.tw=null; this.alpha=0; this.fade=null; this.dead=false;
    this.lines=[]; this.label=null;
    this.group = new THREE.Group(); this.group.renderOrder=12; scene.add(this.group);
    bits.forEach(b=>this.addLine(b, true));
  }
  addLine(bit, instant){
    const mk=()=>new THREE.SpriteMaterial({map:TEX_BAR, transparent:true, opacity:0,
      depthWrite:false, depthTest:false, blending:THREE.AdditiveBlending});
    const sprites=[];
    if(bit==="1"){ const sp=new THREE.Sprite(mk()); sp.renderOrder=12; sp.userData={w:GEN_W}; sprites.push(sp); }
    else [-1,1].forEach(side=>{ const sp=new THREE.Sprite(mk()); sp.renderOrder=12;
      sp.userData={w:GEN_W*.42, side}; sprites.push(sp); });
    sprites.forEach(sp=>this.group.add(sp));
    this.lines.push({sprites, born: instant? -1e9 : GEN.t});
    return this;
  }
  setLabel(text){
    const m=new THREE.SpriteMaterial({map:smallTex(text), transparent:true, opacity:0,
      depthWrite:false, depthTest:false});
    m.color = new THREE.Color(0xd4b06a);
    this.label = new THREE.Sprite(m); this.label.renderOrder=12;
    this.label.scale.set(36,14.4,1);
    this.group.add(this.label);
    return this;
  }
  moveTo(x1,y1,dur){ this.tw={x0:this.cx, y0:this.cy, x1, y1, t0:GEN.t, dur}; return this; }
  fadeOut(delay,dur){ this.fade={t0:GEN.t+delay, dur}; return this; }
  update(){
    if(this.dead) return;
    if(this.tw){
      const k = easeG((GEN.t-this.tw.t0)/this.tw.dur);
      this.cx = this.tw.x0+(this.tw.x1-this.tw.x0)*k;
      this.cy = this.tw.y0+(this.tw.y1-this.tw.y0)*k;
      if(k>=1) this.tw=null;
    }
    this.alpha += (1-this.alpha)*.1;
    let fade = 1;
    if(this.fade && GEN.t>=this.fade.t0){
      fade = 1-Math.min(1,(GEN.t-this.fade.t0)/this.fade.dur);
      if(fade<=0){ scene.remove(this.group); this.dead=true; return; }
    }
    const A = this.alpha*fade;
    const center = new THREE.Vector3(0,6,0);
    this.lines.forEach((L,i)=>{
      const grow = L.born<-1e8? 1 : easeG((GEN.t-L.born)/520);
      const base = center.clone().addScaledVector(camRight, this.cx*FIT.ui)
                                 .addScaledVector(camUp, this.cy + i*(GEN_TH+GEN_GAP));
      L.sprites.forEach(sp=>{
        const w = sp.userData.w*grow*FIT.ui;
        sp.scale.set(Math.max(w,.001), GEN_TH*2.1, 1);
        const off = sp.userData.side? sp.userData.side*(GEN_W/2 - sp.userData.w/2)*grow*FIT.ui : 0;
        sp.position.copy(base).addScaledVector(camRight, off);
        sp.material.opacity = .95*A*Math.max(grow,.001);
      });
    });
    if(this.label){
      this.label.position.copy(center).addScaledVector(camRight, this.cx*FIT.ui).addScaledVector(camUp, this.cy-19);
      this.label.material.opacity = .9*A;
    }
  }
}
function buildOrderLines(){

function startGenesis(){

     A = new GStack(["1"], 0, 86); A.lines[0].born = GEN.t;
     burst(new THREE.Vector3(0,6,0), Math.round(60*state.density), {spMin:.6,spVar:2.6,life:1100,al:.95}); }],

  // 八卦依「地山水风雷火泽天」次第生成

function finishGenesis(skip){
  GEN.stacks.forEach(st=>{ if(!st.dead) scene.remove(st.group); });
  GEN.stacks = [];
  trigramNodes.forEach(n=>{ n.showT=1; if(skip) n.show=1; });
  state.ringShowT = 1; if(skip) state.ringShow = 1;
  state.coreVis = 1; state.vortexT = 0; if(skip) state.vortex = 0;
  state.coreGlow = 0; GEN.taijiIn = null;
  GEN.lineOpT = .16; if(skip) GEN.lineOp = .16;
  if(GEN.spokes){
    GEN.spokes.forEach(o=>o.line.geometry.setDrawRange(0, 25));
    GEN.octa.line.geometry.setDrawRange(0, 97);
  }
  hideCap();
  SFX.droneStop();
  GEN.active = false;
}
function genesisStep(dt){
  if(!GEN.active) return;
  GEN.t += dt*state.speed;
  while(GEN.idx < GEN.tl.length && GEN.tl[GEN.idx][0] <= GEN.t){ GEN.tl[GEN.idx][1](); GEN.idx++; }
  if(GEN.collect) GEN.collect();
  // 太极显形
  if(GEN.taijiIn!=null){
    const k = Math.min(1, (GEN.t-GEN.taijiIn)/2300);
    state.coreVis = easeG(k);
    state.taijiSpin += dt*.0014*(1-k)*state.speed;
  }
  // 核心脉冲
  let glow = 0;
  GEN.pulses = GEN.pulses.filter(pl=>GEN.t-pl.at < pl.dur);
  GEN.pulses.forEach(pl=>{
    const k = (GEN.t-pl.at)/pl.dur;
    glow = Math.max(glow, pl.amp*Math.sin(Math.PI*Math.min(1,k)));
  });
  state.coreGlow = glow;
  // 漩涡
  state.vortex += (state.vortexT-state.vortex)*.04;
  // 生成栈
  GEN.stacks.forEach(st=>st.update());
  GEN.stacks = GEN.stacks.filter(st=>!st.dead);
  // 能量线生长
  if(GEN.spokes){
    GEN.spokes.forEach(o=>{
      if(o.start!=null){
        const k = Math.min(1,(GEN.t-o.start)/650);
        o.line.geometry.setDrawRange(0, Math.round(k*25));
      }
    });
    if(GEN.octa.start!=null){
      const k = Math.min(1,(GEN.t-GEN.octa.start)/1500);
      GEN.octa.line.geometry.setDrawRange(0, Math.round(k*97));
    }
  }
  if(GEN.t > GEN.endAt) finishGenesis(false);
}

/* ═══════════════════════ 七 · 主循环 ═══════════════════════ */
const ray = new THREE.Raycaster(), mouseNDC = new THREE.Vector2();
let lastT = performance.now();
function frame(t){
  const dt = Math.min(t-lastT, 50); lastT = t;
  const sp = state.speed, rm = reduceMotion?0:1;

  // 相机
  camera.getWorldDirection(camRight); // 临时借用
  const camTarget = GEN.active? GEN.camTarget : ((RIT.active && RIT.phase!=="dissolve")? camRitual : camBase);
  const px = state.px*16, py = state.py*10;
  camera.position.lerp(new THREE.Vector3(camTarget.x+px, camTarget.y-py, camTarget.z), .035);
  camera.lookAt(lookTarget);
  camera.updateMatrixWorld();
  camUp.set(0,1,0).applyQuaternion(camera.quaternion);
  camRight.set(1,0,0).applyQuaternion(camera.quaternion);

  // 自转
  if(!state.dragging){
    state.taijiSpin += (.00013*sp*rm + state.taijiVel)*dt;
    state.taijiVel *= Math.pow(.994, dt);
    if(Math.abs(state.taijiVel)<1e-6) state.taijiVel=0;
  }
  taiji.rotation.z = state.taijiSpin;
  const breath = 1+.03*Math.sin(t*.0011*sp)*rm;
  taiji.scale.setScalar(state.coreScale*breath);
  taiji.material.opacity = state.coreVis;
  const glowVis = Math.max(state.coreVis, state.coreGlow);
  coreGlowSp.material.opacity = (.36+.2*state.coreGlow + .07*Math.sin(t*.002*sp)*rm)*glowVis;
  coreGlowSp.scale.setScalar(170*(1+state.coreGlow*.28)*breath);
  coreFire.material.opacity = .26*state.coreGlow;
  ringGroup.rotation.z += .000016*sp*rm*dt*(1-state.ringDim*.7);
  galaxy.rotation.y += .0000105*sp*rm*dt;
  stars.rotation.y += .0000022*sp*rm*dt;
  nebulas.forEach((n,i)=>{ n.material.rotation += (.000004+i*.0000025)*sp*rm*dt; });
  mandala.rotation.z = Math.sin(t*.00006*sp)*.02*rm;

  // 环减暗 / 创世显隐
  state.ringShow += (state.ringShowT-state.ringShow)*.06;
  const dim = (1-state.ringDim)*state.ringShow;
  dimmable.forEach(d=>{ d.mat.opacity = d.base*dim; });
  flowPts.material.opacity = dim;

  // 八卦悬停态
  trigramNodes.forEach(n=>{
    n.show += (n.showT-n.show)*.1;
    const sel = state.selected===n.tid, hov = state.hover===n.tid;
    const target = (sel||hov)? new THREE.Color(0xd4b06a) : n.baseColor;
    n.mat.color.lerp(target, .12);
    n.mat.opacity = .92*dim*n.show;
    n.label.material.opacity = .95*dim*n.show;
    n.halo.material.opacity += (((sel?.5:hov?.34:0)*dim*n.show) - n.halo.material.opacity)*.12;
    const s = 1+((sel||hov)?.1:0);
    n.grp.scale.lerp(new THREE.Vector3(s,s,s), .12);
    n.label.material.color.lerp((sel||hov)? new THREE.Color(0xd4b06a):new THREE.Color(0xe7ddc4), .15);
    if(hov && Math.random()<.25*state.density*rm){
      const wp = new THREE.Vector3(); n.grp.getWorldPosition(wp);
      burst(wp, 1, {spMin:.2,spVar:.6,life:650,al:.7});
    }
  });

  // 能量流
  {
    const count = Math.round(FLOW_MAX*(state.density/1.7));
    const pos = flowGeo.attributes.position.array, col = flowGeo.attributes.color.array;
    for(let i=0;i<FLOW_MAX;i++){
      const f = flows[i];
      f.a += f.v*dt*sp*rm; f.ph += dt*.001;
      const r = R_TRI + Math.sin(f.ph)*9 + f.jr;
      pos[i*3]=Math.cos(f.a)*r; pos[i*3+1]=Math.sin(f.a)*r; pos[i*3+2]=Math.sin(f.ph*1.7)*4;
      const vis = i<count? f.al*(.6+.4*Math.sin(f.ph*2)) : 0;
      col[i*3]=.87*vis; col[i*3+1]=.75*vis; col[i*3+2]=.5*vis;
    }
    flowGeo.attributes.position.needsUpdate = true;
    flowGeo.attributes.color.needsUpdate = true;
  }
  // 星尘
  {
    const attract = RIT.active && (RIT.phase==="gather"||RIT.phase==="lines");
    const count = Math.round(MOTE_MAX*(state.density/1.7));
    const pos = motePts.geometry.attributes.position.array, col = motePts.geometry.attributes.color.array;
    const center = new THREE.Vector3(0,6,0);
    for(let i=0;i<MOTE_MAX;i++){
      const m = motes[i];
      m.ph += dt*.0007;
      if(rm){
        m.v.x += Math.cos(m.ph)*.0008; m.v.y += Math.sin(m.ph*1.3)*.0008; m.v.z += Math.sin(m.ph*.9)*.0005;
      }
      if(attract){
        const d = center.clone().sub(m.p); const L = d.length()+.01; d.normalize();
        m.v.addScaledVector(d, .02*sp);
        m.v.x += -d.y*.011; m.v.y += d.x*.011;
        if(L<26){ m.p.copy(moteHome()); m.v.set(0,0,0); }
      }
      if(state.vortex>.01){
        const toC = center.clone().sub(m.p); const L = toC.length()+.01; toC.normalize();
        m.v.addScaledVector(toC, (L-70)*.0007*state.vortex*sp);
        m.v.x += -toC.y*.055*state.vortex*sp; m.v.y += toC.x*.055*state.vortex*sp;
        m.v.z *= .98;
      }
      m.v.multiplyScalar(.985);
      m.p.addScaledVector(m.v, dt*.06);
      if(m.p.length()>760) m.p.copy(moteHome());
      pos[i*3]=m.p.x; pos[i*3+1]=m.p.y; pos[i*3+2]=m.p.z;
      const tw = i<count? m.amp*(.7+.3*Math.sin(m.ph*2.1)) : 0;
      col[i*3]=m.base.r*tw; col[i*3+1]=m.base.g*tw; col[i*3+2]=m.base.b*tw;
    }
    motePts.geometry.attributes.position.needsUpdate = true;
    motePts.geometry.attributes.color.needsUpdate = true;
  }
  // 火花
  {
    const pos = sparkPts.geometry.attributes.position.array, col = sparkPts.geometry.attributes.color.array;
    for(let i=sparks.length-1;i>=0;i--){
      const s = sparks[i];
      s.t += dt*sp;
      if(s.t>=s.max){ sparks.splice(i,1); continue; }
      if(s.seek && s.target){
        const d = s.target.clone().sub(s.p);
        s.v.addScaledVector(d, s.seek*dt*.06);
      }
      s.v.multiplyScalar(s.drag);
      s.p.addScaledVector(s.v, dt*.06*sp);
    }
    for(let i=0;i<SPARK_MAX;i++){
      if(i<sparks.length){
        const s = sparks[i], k = s.t/s.max;
        const a = (k<.15? k/.15 : 1)*(1-k);
        pos[i*3]=s.p.x; pos[i*3+1]=s.p.y; pos[i*3+2]=s.p.z;
        col[i*3]=s.c.r*a; col[i*3+1]=s.c.g*a; col[i*3+2]=s.c.b*a;
      } else { col[i*3]=col[i*3+1]=col[i*3+2]=0; }
    }
    sparkPts.geometry.attributes.position.needsUpdate = true;
    sparkPts.geometry.attributes.color.needsUpdate = true;
  }

  ritualStep(dt);
  genesisStep(dt);
  if(GEN.spokes){
    GEN.lineOp += (GEN.lineOpT-GEN.lineOp)*.05;
    const lo = GEN.lineOp*dim;
    GEN.spokes.forEach(o=>o.line.material.opacity = lo);
    GEN.octa.line.material.opacity = lo*1.25;
  }
  RIT.bars.forEach((b,i)=>layoutBar(b,i));

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

/* ═══════════════════════ 八 · 指针交互 ═══════════════════════ */
function pick(e){
  mouseNDC.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mouseNDC, camera);
  const hits = ray.intersectObjects(trigramNodes.map(n=>n.hit), false);
  return hits.length? hits[0].object.userData.tid : -1;
}
function overCore(e){
  mouseNDC.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mouseNDC, camera);
  return ray.intersectObject(taiji, false).length>0;
}
let dragMoved = 0;
canvas.addEventListener("pointermove", e=>{
  state.px = (e.clientX/innerWidth-.5)*2; state.py = (e.clientY/innerHeight-.5)*2;
  if(state.dragging){
    const a = Math.atan2(e.clientY-innerHeight/2, e.clientX-innerWidth/2);
    let d = a-state.lastDragA;
    if(d>Math.PI) d-=2*Math.PI; if(d<-Math.PI) d+=2*Math.PI;
    state.taijiSpin += d; state.taijiVel = d/16; state.lastDragA = a;
    dragMoved += Math.abs(d);
    return;
  }
  const busy = (RIT.active && RIT.phase!=="done") || GEN.active;
  const h = busy? -1 : pick(e);
  if(h>=0 && h!==state.hover) SFX.tick();
  state.hover = h;
  canvas.style.cursor = h>=0? "pointer" : (!busy && overCore(e))? "grab" : "default";
});
canvas.addEventListener("pointerdown", e=>{
  if(!RIT.active && !GEN.active && overCore(e)){
    state.dragging = true; dragMoved = 0;
    state.lastDragA = Math.atan2(e.clientY-innerHeight/2, e.clientX-innerWidth/2);
    canvas.setPointerCapture(e.pointerId); canvas.style.cursor="grabbing";
  }
});
canvas.addEventListener("pointerup", e=>{
  if(state.dragging){
    state.dragging=false; canvas.style.cursor="grab";
    if(dragMoved<.06) openAsk();
    else if(Math.abs(state.taijiVel)>.004 || dragMoved>2.2) openAsk();
    return;
  }
  if((RIT.active && RIT.phase!=="done") || GEN.active) return;
  const h = pick(e);
  if(h>=0){ state.selected=h; showTrigram(TRIGRAMS[h]); SFX.pluck(); }
});

/* —— AI 深解（本地 Grok CLI / Anthropic / OpenAI / Gemini）—— */
const AI_PROVIDERS = {
  grokcli: {
    name:"Grok CLI", requiresKey:false,
    async call(_, prompt){
      const resp = await fetch("/api/interpret",{
        method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({prompt}),
      });
      const d = await resp.json().catch(()=>({}));
      if(!resp.ok) throw {status:resp.status, message:d.error||"本地 Grok 服务未启动"};
      return {...d.interpretation, __meta:{provider:d.provider, model:d.model, durationMs:d.durationMs}};
    },
  },
  anthropic: {
    name:"Claude", keyHint:"sk-ant-…",
    model: ()=> localStorage.getItem("yi_model_anthropic") || "claude-sonnet-4-6",
    async call(key, prompt){
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"content-type":"application/json","x-api-key":key,
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:this.model(), max_tokens:800, messages:[{role:"user",content:prompt}]}),
      });
      if(!resp.ok) throw {status:resp.status};
      const d = await resp.json();
      return (d.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n");
    },
  },
  openai: {
    name:"GPT", keyHint:"sk-…",
    model: ()=> localStorage.getItem("yi_model_openai") || "gpt-4o-mini",
    async call(key, prompt){
      const resp = await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{"content-type":"application/json","authorization":"Bearer "+key},
        body:JSON.stringify({model:this.model(), max_tokens:800, messages:[{role:"user",content:prompt}]}),
      });
      if(!resp.ok) throw {status:resp.status};
      const d = await resp.json();
      return d.choices?.[0]?.message?.content || "";
    },
  },
  gemini: {
    name:"Gemini", keyHint:"AIza…",
    model: ()=> localStorage.getItem("yi_model_gemini") || "gemini-2.0-flash",
    async call(key, prompt){
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${this.model()}:generateContent?key=${encodeURIComponent(key)}`,{
        method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
          generationConfig:{maxOutputTokens:800}}),
      });
      if(!resp.ok) throw {status:resp.status};
      const d = await resp.json();
      return (d.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("\n");
    },
  },
};
function aiProvider(){
  const saved = localStorage.getItem("yi_ai_provider");
  if(saved && AI_PROVIDERS[saved]) return saved;
  return /^(localhost|127\.0\.0\.1)$/.test(location.hostname)? "grokcli" : "anthropic";
}
function aiKeyName(p){ return "yi_key_"+p; }
function buildPrompt(){
  const L = LAST, r = L.r;
  const moving = movingLineData(r, L.vals);
  const special = specialYaoData(r, L.vals);
  const mv = moving.map(o=>`${o.name}：${o.text}（爻位提示：${YAO_HINT[o.i]}）`).join("；");
  const specialText = special? `全变特例：${special.name}：${special.text}` : "";
  const tag = TAG64[r.ben.no]||["宜审",""];
  const change = r.changed
    ? `动爻原文与爻位提示：${mv}。${specialText?specialText+"。":""}之卦「${r.zhi.name}」（第${r.zhi.no}卦），卦辞：${GUACI[r.zhi.no]}。转向局势：${ZHE[r.zhi.no]}；转向行动参考：${YONG[r.zhi.no]}。`
    : "六爻安静无变爻，局面变量较少，以本卦为主。";
  return `你是精通《周易》义理、克制而务实的现代决策顾问。请把卦象作为审视处境与选择的框架，不作宿命化预测。
求问：「${L.q||"未具体说明，泛观时运"}」（领域：${L.domain}）。
六爻数值自下而上：${L.vals.join("、")}（6老阴、7少阳、8少阴、9老阳）。
本卦「${r.ben.name}」（第${r.ben.no}卦），卦辞：${GUACI[r.ben.no]}。程序局势参考：${ZHE[r.ben.no]}；时机参考：${tag[0]}，${tag[1]}；行动参考：${DOM_PRE[L.domain]||""}${YONG[r.ben.no]}。
${change}
只依据以上材料，不虚构未提供的经文原句。请综合卦象与求问，不要复述材料；用现代、具体、可执行的语言作答，分四段，每段一行，依次为：
【局势】一句话判断当前处境；【时机】当下宜进/宜守/宜退及理由；【行动】两到三条具体可操作的建议；【提醒】最需要警惕的一个风险。
不预测吉凶祸福的绝对结果，不涉及医疗诊断与投资指令，落点在思路与行动。`;
}
async function aiInterpret(){
  const el = document.getElementById("aiOut");
  if(!el || !LAST) return;
  const p = aiProvider(), prov = AI_PROVIDERS[p];
  let key = prov.requiresKey===false? "" : localStorage.getItem(aiKeyName(p));
  if(prov.requiresKey!==false && !key){
    key = prompt(`输入 ${prov.name} API Key（${prov.keyHint}）\n仅保存在本机浏览器，可在「AI 设置」中更换或清除`);
    if(!key) return;
    key = key.trim(); localStorage.setItem(aiKeyName(p), key);
  }
  el.innerHTML = `<p class="sub">凝神叩问，${prov.name} 推演中……</p>`;
  try{
    const result = await prov.call(key, buildPrompt());
    if(!result) throw {status:"空响应"};
    const html = typeof result==="string"
      ? result.split(/\n+/).filter(Boolean).map(line=>`<p style="margin-bottom:8px">${esc(line)}</p>`).join("")
      : `${result.__meta?`<div class="aiSource"><b>GROK CLI · LOCAL</b><span>${esc(result.__meta.model||"")} · ${((result.__meta.durationMs||0)/1000).toFixed(1)} 秒</span></div>`:""}
         <p style="margin-bottom:8px"><b>【局势】</b>${esc(result.situation||"")}</p>
         <p style="margin-bottom:8px"><b>【时机】</b>${esc(result.timing||"")}</p>
         <p style="margin-bottom:8px"><b>【行动】</b>${(result.actions||[]).map((x,i)=>`${i+1}. ${esc(x)}`).join("<br>")}</p>
         <p style="margin-bottom:8px"><b>【提醒】</b>${esc(result.warning||"")}</p>`;
    el.innerHTML = html
      + `<p class="sub" style="opacity:.55">由 ${prov.name} 推演 · 仅供参考</p>`;
    SFX.pluck();
  }catch(err){
    if(prov.requiresKey!==false && (err.status===401 || err.status===403)){
      localStorage.removeItem(aiKeyName(p));
      el.innerHTML = `<p class="sub">${prov.name} API Key 无效，已清除——请再次点击「AI 深解」重新输入。</p>`;
    } else {
      el.innerHTML = `<p class="sub">推演未通（${esc(String(err.status||err.message||err))}）。请检查网络或 Key 后重试。</p>`;
    }
  }
}
function aiSettings(){
  const cur = aiProvider();
  const pick = prompt(`选择 AI 服务（输入序号）：\n1. Grok CLI（本地服务）\n2. Claude（Anthropic）\n3. GPT（OpenAI）\n4. Gemini（Google）\n\n当前：${AI_PROVIDERS[cur].name}；输入 0 清除当前服务已存的 Key`, {grokcli:"1",anthropic:"2",openai:"3",gemini:"4"}[cur]);
  if(pick==null) return;
  if(pick.trim()==="0"){ localStorage.removeItem(aiKeyName(cur)); alert("已清除 "+AI_PROVIDERS[cur].name+" 的 Key"); return; }
  const p = {1:"grokcli",2:"anthropic",3:"openai",4:"gemini"}[pick.trim()];
  if(!p) return;
  localStorage.setItem("yi_ai_provider", p);
  const btn = document.getElementById("aiBtn");
  if(btn) btn.textContent = `✦ AI 深解（${AI_PROVIDERS[p].name}）`;
}

/* —— 海报生成 —— */
function wrapText(g, text, maxChars){
  const out=[]; let line="";
  for(const ch of text){
    line += ch;
    if(line.length>=maxChars){ out.push(line); line=""; }
  }
  if(line) out.push(line);
  return out;
}
const POSTER_FONT = '"Songti SC","STSong","Noto Serif SC","SimSun",serif';
function drawPoster(){
  const L = LAST; if(!L) return null;
  const W=1080, H=1700, c=document.createElement("canvas");
  c.width=W; c.height=H;
  const g=c.getContext("2d");
  // 底色 + 星空
  const bg=g.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0b1020"); bg.addColorStop(.5,"#070b16"); bg.addColorStop(1,"#03050b");
  g.fillStyle=bg; g.fillRect(0,0,W,H);
  for(let i=0;i<240;i++){
    const x=Math.random()*W, y=Math.random()*H, r=Math.random()*1.4+.3;
    g.globalAlpha=.12+Math.random()*.5;
    g.fillStyle=Math.random()<.2?"#e8cf9a":"#dfe6ee";
    g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  }
  g.globalAlpha=1;
  // 金色圆环意象
  g.strokeStyle="rgba(212,176,106,.22)"; g.lineWidth=2;
  g.beginPath(); g.arc(W/2, 760, 420, 0, Math.PI*2); g.stroke();
  g.strokeStyle="rgba(212,176,106,.1)";
  g.beginPath(); g.arc(W/2, 760, 480, 0, Math.PI*2); g.stroke();
  // 顶部题
  g.textAlign="center"; g.fillStyle="rgba(212,176,106,.85)";
  g.font=`600 34px ${POSTER_FONT}`;
  g.fillText("周 易 观 卦", W/2, 96);
  g.fillStyle="rgba(231,221,196,.4)"; g.font=`24px ${POSTER_FONT}`;
  g.fillText("仰以观于天文 · 俯以察于地理", W/2, 142);
  // 所问
  let y=230;
  if(L.q){
    g.fillStyle="#e7ddc4"; g.font=`42px ${POSTER_FONT}`;
    wrapText(g, `「${L.q}」`, 18).slice(0,2).forEach(line=>{ g.fillText(line, W/2, y); y+=58; });
    g.fillStyle="rgba(231,221,196,.45)"; g.font=`24px ${POSTER_FONT}`;
    g.fillText(`—— ${L.domain}之问`, W/2, y+6); y+=40;
  }
  // 六爻（自下而上）
  const bw=380, th=36, gap=30, total=6*th+5*gap;
  const hy0 = 560, accent="#cf6a4a", inkc="#e9e0c8";
  L.vals.forEach((v,i)=>{
    const yy = hy0 + total - th - i*(th+gap);
    const yang = v%2===1, moving = v===6||v===9;
    g.fillStyle = moving? accent : inkc;
    g.shadowColor = moving? "rgba(207,106,74,.7)" : "rgba(233,224,200,.45)";
    g.shadowBlur = 22;
    const rr=(x,w)=>{ const r=7; g.beginPath();
      g.moveTo(x+r,yy); g.arcTo(x+w,yy,x+w,yy+th,r); g.arcTo(x+w,yy+th,x,yy+th,r);
      g.arcTo(x,yy+th,x,yy,r); g.arcTo(x,yy,x+w,yy,r); g.closePath(); g.fill(); };
    if(yang) rr(W/2-bw/2, bw);
    else { rr(W/2-bw/2, bw*.42); rr(W/2+bw/2-bw*.42, bw*.42); }
    g.shadowBlur=0;
    if(moving){
      g.fillStyle="rgba(224,121,90,.95)"; g.font=`30px ${POSTER_FONT}`;
      g.textAlign="left"; g.fillText(v===9?"○":"×", W/2+bw/2+28, yy+th-6);
      g.textAlign="center";
    }
  });
  // 卦名 + 拼音
  let ny = hy0+total+110;
  g.fillStyle="#e7d6a8"; g.font=`600 88px ${POSTER_FONT}`;
  g.shadowColor="rgba(212,176,106,.55)"; g.shadowBlur=30;
  g.fillText(L.r.ben.name, W/2, ny);
  g.shadowBlur=0;
  ny+=46; g.fillStyle="rgba(212,176,106,.55)"; g.font=`italic 28px Georgia,serif`;
  g.fillText(HEX_PY[L.r.ben.no]||"", W/2, ny);
  if(L.r.changed){
    ny+=58; g.fillStyle="rgba(231,221,196,.6)"; g.font=`38px ${POSTER_FONT}`;
    g.fillText(`之 ${L.r.zhi.name}`, W/2, ny);
  }
  // 卦辞
  ny+=72; g.fillStyle="rgba(231,221,196,.78)"; g.font=`30px ${POSTER_FONT}`;
  wrapText(g, GUACI[L.r.ben.no], 24).slice(0,2).forEach(line=>{ g.fillText(line, W/2, ny); ny+=46; });
  // 分隔
  ny+=18;
  g.strokeStyle="rgba(212,176,106,.35)"; g.lineWidth=1;
  g.beginPath(); g.moveTo(W/2-220, ny); g.lineTo(W/2+220, ny); g.stroke();
  // 时机断语
  const tag = TAG64[L.r.ben.no]||["宜审",""];
  ny+=78; g.fillStyle="#e0795a"; g.font=`600 52px ${POSTER_FONT}`;
  g.fillText(tag[0].split("").join(" "), W/2, ny);
  ny+=52; g.fillStyle="rgba(231,221,196,.7)"; g.font=`28px ${POSTER_FONT}`;
  g.fillText(tag[1], W/2, ny);
  // 行动建议
  ny+=58; g.fillStyle="rgba(231,221,196,.6)"; g.font=`26px ${POSTER_FONT}`;
  wrapText(g, YONG[L.r.ben.no], 26).slice(0,3).forEach(line=>{ g.fillText(line, W/2, ny); ny+=40; });
  // 落款
  const d=L.date;
  g.fillStyle="rgba(212,176,106,.5)"; g.font=`24px ${POSTER_FONT}`;
  g.fillText(`${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日 占`, W/2, H-96);
  g.fillStyle="rgba(231,221,196,.3)"; g.font=`22px ${POSTER_FONT}`;
  g.fillText("观乎天文，以察时变 · yi.reelos.ai", W/2, H-54);
  return c;
}
let posterURL = null;
function showPoster(){
  const c = drawPoster(); if(!c) return;
  posterURL = c.toDataURL("image/png");
  document.getElementById("posterImg").src = posterURL;
  document.getElementById("posterOverlay").classList.add("open");
  SFX.pluck();
}
document.getElementById("posterClose").onclick = ()=>document.getElementById("posterOverlay").classList.remove("open");
document.getElementById("posterSave").onclick = ()=>{
  if(!posterURL) return;
  const a=document.createElement("a");
  a.href=posterURL; a.download=`观卦-${LAST? LAST.r.ben.name:"周易"}.png`; a.click();
};
document.getElementById("posterShare").onclick = async ()=>{
  if(!posterURL) return;
  try{
    const blob = await (await fetch(posterURL)).blob();
    const file = new File([blob], "guangua.png", {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:"周易观卦", text: LAST&&LAST.q? `所问「${LAST.q}」，得${LAST.r.ben.name}` : `观卦得${LAST? LAST.r.ben.name:""}`});
    } else {
      document.getElementById("posterSave").click();
    }
  }catch(e){ /* 用户取消分享 */ }
};

/* ═══════════════════════ 十 · 控制台 ═══════════════════════ */
document.getElementById("castBtn").onclick = ()=>{ if(GEN.active) return; openAsk(); };
document.getElementById("genesisBtn").onclick = startGenesis;
document.getElementById("manualBtn").onclick = openManual;
document.getElementById("fxSeg").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  state.density = +b.dataset.d;
  document.querySelectorAll("#fxSeg button").forEach(x=>x.classList.toggle("on", x===b));
});
document.getElementById("speed").addEventListener("input", e=>{
  state.speed = +e.target.value;
  document.documentElement.style.setProperty("--speed", state.speed);
});
document.getElementById("sndBtn").onclick = e=>{
  const onNow = SFX.toggle();
  e.target.textContent = onNow? "音效 · 开" : "音效 · 关";
  e.target.classList.toggle("off", !onNow);
  if(onNow) SFX.pluck();
};
if(location.protocol==="file:") document.getElementById("localNotice").style.display="block";
setTimeout(()=>{ const t=document.getElementById("tip"); if(t) t.style.opacity="0"; }, 10000);
</script>
</body>
</html>
